- name: Deploy PS + Worker0 to eq-ps VM
  run: |
    ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no azureuser@${{ secrets.PS_PUBLIC_IP }} << 'EOF'
      docker pull $IMAGE_PS:latest
      docker pull $IMAGE_WORKER:latest

      docker stop eq-ps eq-worker0 2>/dev/null || true
      docker rm   eq-ps eq-worker0 2>/dev/null || true
      docker network create eq-net 2>/dev/null || true

      docker run -d --name eq-ps \
        --network eq-net \
        --restart unless-stopped \
        --memory 512m \
        --memory-swap 512m \
        -p 50051:50051 \
        -e NUM_WORKERS=2 \
        -e PS_PORT=50051 \
        -e LR=0.001 \
        -e STRAGGLER_TIMEOUT=30 \
        -e MAX_ROUNDS=1000 \
        -e AZURE_STORAGE_CONNECTION_STRING='$AZURE_STORAGE_CONNECTION_STRING' \
        $IMAGE_PS:latest

      echo "Waiting for PS to be ready..."
      sleep 20

      for i in 1 2 3 4 5; do
        nc -z localhost 50051 && echo "PS ready!" && break || echo "PS not ready (attempt $i)..." && sleep 10
      done

      docker run -d --name eq-worker0 \
        --network eq-net \
        --restart on-failure \
        --memory 768m \
        --memory-swap 768m \
        -e WORKER_ID=0 \
        -e PS_HOST=eq-ps \
        -e PS_PORT=50051 \
        -e AZURE_STORAGE_CONNECTION_STRING='$AZURE_STORAGE_CONNECTION_STRING' \
        $IMAGE_WORKER:latest
    EOF