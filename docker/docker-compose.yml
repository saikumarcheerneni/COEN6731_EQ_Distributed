version: '3.8'

services:

  # ── Parameter Server ──────────────────────────────
  eq-ps:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ps
    container_name: eq-ps
    environment:
      - PS_PORT=50051
      - NUM_WORKERS=2
      - LR=0.001
      - STRAGGLER_TIMEOUT=30
    ports:
      - "50051:50051"
    networks:
      - eq-net
    restart: unless-stopped

  # ── Worker 0 ──────────────────────────────────────
  eq-worker0:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: eq-worker0
    environment:
      - PS_HOST=eq-ps
      - PS_PORT=50051
      - WORKER_ID=0
    depends_on:
      - eq-ps
    networks:
      - eq-net
    volumes:
      - ./data_shards:/app/data_shards
      - ./outputs:/app/outputs
    restart: on-failure

  # ── Worker 1 ──────────────────────────────────────
  eq-worker1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: eq-worker1
    environment:
      - PS_HOST=eq-ps
      - PS_PORT=50051
      - WORKER_ID=1
    depends_on:
      - eq-ps
    networks:
      - eq-net
    volumes:
      - ./data_shards:/app/data_shards
      - ./outputs:/app/outputs
    restart: on-failure

  # ── Flask Website ─────────────────────────────────
  eq-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: eq-web
    environment:
      - PS_HOST=eq-ps
      - PS_PORT=50051
      - FLASK_PORT=5000
    ports:
      - "5000:5000"
    depends_on:
      - eq-ps
    networks:
      - eq-net
    restart: unless-stopped

networks:
  eq-net:
    driver: bridge
